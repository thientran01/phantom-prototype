<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Phantom — MVP vs v2</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Geist:wght@300..700&display=swap">
<style>
  :root {
    --paper: #FAF6EE;
    --paper-deep: #F2ECDE;
    --ink: #1A1714;
    --ink-70: rgba(26,23,20,0.70);
    --ink-55: rgba(26,23,20,0.55);
    --ink-35: rgba(26,23,20,0.35);
    --ink-15: rgba(26,23,20,0.15);
    --rule: #E8E1D2;
    --sans: "Geist", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --display: "Newsreader", "Iowan Old Style", Georgia, serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
  }
  .back {
    position: absolute; top: 22px; right: 32px;
    font-size: 13px; color: var(--ink-55);
    text-decoration: none;
    font-family: var(--sans);
    letter-spacing: -0.005em;
  }
  .back:hover { color: var(--ink); }

  .state-strip {
    max-width: 1280px; margin: 0 auto;
    padding: 32px 32px 20px;
    display: flex; flex-wrap: wrap; gap: 8px;
    align-items: center;
  }
  .state-strip .label {
    font-family: var(--sans);
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-55);
    padding: 6px 4px 6px 0;
    margin-right: 4px;
  }
  .state-strip button {
    font-family: var(--sans); font-size: 13px;
    letter-spacing: -0.005em;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 8px 14px;
    cursor: pointer;
    transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
  }
  .state-strip button:hover { border-color: var(--ink-35); }
  .state-strip button.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 28px;
    padding: 4px 32px 56px;
    max-width: 1280px; margin: 0 auto;
  }
  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
  }

  .col {
    display: flex; flex-direction: column;
    gap: 10px;
    min-width: 0;
  }
  .col-label {
    font-family: var(--sans);
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-55);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }

  .frame-wrap {
    position: relative;
    background: var(--paper-deep);
    border: 1px solid var(--rule);
    border-radius: 20px;
    overflow: hidden;
    height: 900px;
  }
  iframe {
    border: 0;
    width: 100%;
    height: 100%;
    display: block;
    background: transparent;
  }
  .open-link {
    position: absolute; top: 12px; right: 14px;
    font-size: 11px; font-family: var(--sans);
    color: var(--ink-55);
    text-decoration: none;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 4px 10px;
    z-index: 2;
    letter-spacing: -0.005em;
  }
  .open-link:hover { color: var(--ink); border-color: var(--ink-35); }
</style>
</head>
<body>
  <a class="back" href="/">← Back to live prototype</a>

  <div class="state-strip" id="stateStrip">
    <span class="label">State</span>
    <button data-level="cold">Cold · 0 ghosts</button>
    <button data-level="warming">Warming · 2 ghosts</button>
    <button data-level="warm" class="active">Warm · 47 ghosts</button>
  </div>

  <div class="grid">
    <div class="col">
      <span class="col-label">MVP</span>
      <div class="frame-wrap">
        <a class="open-link" href="/legacy/v1/index.html" target="_blank">Open ↗</a>
        <iframe src="/legacy/v1/index.html" title="Phantom MVP"></iframe>
      </div>
    </div>

    <div class="col">
      <span class="col-label">v2</span>
      <div class="frame-wrap">
        <a class="open-link" href="/" target="_blank">Open ↗</a>
        <iframe id="liveFrame" src="/?embed=1&level=warm" title="Phantom v2"></iframe>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const strip = document.getElementById('stateStrip');
      const frame = document.getElementById('liveFrame');
      const openLink = frame.parentElement.querySelector('.open-link');
      strip.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-level]');
        if (!btn) return;
        strip.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const level = btn.dataset.level;
        frame.src = `/?embed=1&level=${level}`;
        if (openLink) openLink.href = `/?level=${level}`;
      });
    })();
  </script>
</body>
</html>
